version: "3.9"

networks:
  tinker-test:
    driver: bridge

volumes:
  loki-data:
  grafana-data:

services:
  # ---------------------------------------------------------------------------
  # Observability stack
  # ---------------------------------------------------------------------------
  loki:
    image: grafana/loki:2.9.4
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/loki-config.yaml
    networks:
      - tinker-test
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.3.3
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=false
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_LOG_LEVEL=warn
    volumes:
      - ./observability/grafana/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
      - grafana-data:/var/lib/grafana
    networks:
      - tinker-test
    depends_on:
      loki:
        condition: service_healthy
    restart: unless-stopped

  promtail:
    image: grafana/promtail:2.9.4
    container_name: promtail
    volumes:
      - ./observability/promtail-config.yaml:/etc/promtail/promtail-config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/log:/var/log:ro
    command: -config.file=/etc/promtail/promtail-config.yaml
    networks:
      - tinker-test
    depends_on:
      loki:
        condition: service_healthy
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Microservices
  # ---------------------------------------------------------------------------
  payments-api:
    build:
      context: ./services/payments-api
      dockerfile: Dockerfile
    container_name: payments-api
    ports:
      - "8001:8001"
    networks:
      - tinker-test
    labels:
      - "service=payments-api"
      - "logging=promtail"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=DEBUG

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    ports:
      - "8002:8002"
    networks:
      - tinker-test
    labels:
      - "service=auth-service"
      - "logging=promtail"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:8002/health', r => process.exit(r.statusCode === 200 ? 0 : 1))\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  order-service:
    build:
      context: ./services/order-service
      dockerfile: Dockerfile
    container_name: order-service
    ports:
      - "8003:8003"
    networks:
      - tinker-test
    labels:
      - "service=order-service"
      - "logging=promtail"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8003/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped
    environment:
      - JAVA_OPTS=-Xmx256m -Xms128m

  inventory-service:
    build:
      context: ./services/inventory-service
      dockerfile: Dockerfile
    container_name: inventory-service
    ports:
      - "8004:8004"
    networks:
      - tinker-test
    labels:
      - "service=inventory-service"
      - "logging=promtail"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8004/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
